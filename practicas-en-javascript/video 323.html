<body>
    
    <script>
        

        let lista=new Set()
        while (lista.size !=10){
            let random=Math.floor(Math.random()*10)+1
            lista.add(random)
        }

        let arreglo=[...lista]
        let sumatoria=arreglo.reduce((acumulador,valor)=>acumulador+valor,0)

        console.log(lista)
        console.log(sumatoria)

    </script>
