<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>agenda</h1>
    <div>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre">
    </div>
    <div>
        <label for="nombre">telefono</label>
        <input type="text" id="telefono">
    </div>
    <div>
        <label for="edad">edad</label>
        <input type="text" id="edad">
    </div>
 

    <input type="button" value="guardar" id="guardar">
    <input type="button" value="mostrar" id="mostrar">

<script>

    //capturo el evento guardar
        document.getElementById("guardar").addEventListener("click", () => {
            //guardo los input en sus respectivas variables
            let nombreInput = document.getElementById("nombre")
            let telefonoInput = document.getElementById("telefono")
            let edadInput = document.getElementById("edad")

            //creo el objeto persona 
            let persona = {
                tel: telefonoInput.value,
                ed: edadInput.value
            }

            //guardo en el local storage con el nombre como clave y el objeto pasado a json con el metodo stringify
            localStorage.setItem(nombreInput.value, JSON.stringify(persona))

            // pongo en blanco los inputs
            nombreInput.value = ""
            telefonoInput.value = ""
            edadInput.value = ""

            alert("Se ha guardado correctamente")
        })

        //capturo el evento del boton mostrar
        document.getElementById("mostrar").addEventListener("click", () => {
            //capturo los inputs
            let nombre = document.getElementById("nombre").value
            let telefono = document.getElementById("telefono")
            let edad = document.getElementById("edad")

            //transformo el contenido del local storaje en un archivo json buscando el nombre
            let contenido = JSON.parse(localStorage.getItem(nombre))

            //confirmo si el contenido esta vacio o contiene el nombre y muestro los valores en los inputs
            if (contenido == null) {
                alert("No se encuentra")
            } else {
                telefono.value = contenido.tel
                edad.value = contenido.ed
            }
        })
</script>
</body>
</html>
