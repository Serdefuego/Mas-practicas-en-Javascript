<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>agenda</h1>
    <div>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre">
    </div>
    <div>
        <label for="nombre">telefono</label>
        <input type="text" id="telefono">
    </div>
    <div>
        <label for="edad">edad</label>
        <input type="text" id="edad">
    </div>
 

    <input type="button" value="guardar" id="guardar">
    <input type="button" value="mostrar" id="mostrar">

    <script>
        

        document.getElementById("guardar").addEventListener("click",()=>{
            let nombre=document.getElementById("nombre").value
            let telefono=document.getElementById("telefono").value
            let edad=document.getElementById("edad").value

            let persona={
                    tel:telefono,
                    ed:edad
                }

            localStorage.setItem(nombre,JSON.stringify(persona))
            nombre.value=""
            telefono.value=""
            edad.value=""
            alert("se ha guardado correctamente")
        })

        document.getElementById("mostrar").addEventListener("click",()=>{
            let nombre=document.getElementById("nombre").value
            let telefono=document.getElementById("telefono")
            let edad=document.getElementById("edad")

            let contenido=JSON.parse(localStorage.getItem(nombre))
            if(contenido!=null){
                alert("no se encuentra")
            }else{
                 telefono.value=contenido.tel
                 edad.value=contenido.ed
            }
            
           
        })
     
    </script>
</body>
</html>
