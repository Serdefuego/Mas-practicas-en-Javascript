<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <label for="ususarios">nombre</label>
    <input type="text" id="nombres">
    <input type="button" value="guardar" id="boton">

    <script>
       
       let nombre=document.getElementById("nombres")
        document.getElementById("boton").addEventListener("click",()=>{
            //esto llama a la funcion guardar que guarda en el local storage
            guardar()
        })

        // esta funcion guarda en el local storage el nombre en la clave usuario
        function guardar(){
            localStorage.setItem("usuario",nombre.value)
            alert("guardado")
        }

       /* Tenés un formulario que guarda usuarios.
                      Guardar en localStorage
            */


    </script>
</body>
</html>
