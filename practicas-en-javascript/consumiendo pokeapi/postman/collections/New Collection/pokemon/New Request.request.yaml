scripts:
  - type: afterResponse
    code: "// Test 1: Verificar status code 200\r

      pm.test(\"Status code es 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      // Test 2: Verificar que tiene nombre\r

      pm.test(\"Pokémon tiene nombre\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.name).to.be.a('string');\r

      \    pm.expect(jsonData.name).to.not.be.empty;\r

      });\r

      \r

      // Test 3: Verificar que tiene imagen frontal\r

      pm.test(\"Pokémon tiene imagen frontal\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.sprites.front_default).to.be.a('string');\r

      });\r

      \r

      // Test 4: Verificar que tiene tipos\r

      pm.test(\"Pokémon tiene al menos un tipo\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.types).to.be.an('array');\r

      \    pm.expect(jsonData.types.length).to.be.greaterThan(0);\r

      });\r

      \r

      // Test 5: Verificar tiempo de respuesta\r

      pm.test(\"Tiempo de respuesta menor a 2 segundos\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });"
