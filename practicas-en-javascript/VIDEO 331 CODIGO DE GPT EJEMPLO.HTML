<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini App Promesas</title>
</head>
<body>

    <h2>Lista de tareas</h2>

    <input type="text" id="tareaInput" placeholder="Escribí una tarea">
    <button onclick="agregarTarea()">Agregar</button>

    <ul id="lista"></ul>

    <script>

        // 🔹 Simulamos una API con promesas
        function guardarEnAPI(tarea){
            return new Promise((resolve, reject)=>{
                setTimeout(()=>{
                    const ok = Math.random()

                    if(ok > 0.2){
                        resolve(tarea)
                    }else{
                        reject("Error al guardar en el servidor")
                    }
                },1000)
            })
        }

        // 🔹 Obtener tareas del localStorage
        function obtenerTareas(){
            return JSON.parse(localStorage.getItem("tareas")) || []
        }

        // 🔹 Guardar tareas en localStorage
        function guardarTareas(tareas){
            localStorage.setItem("tareas", JSON.stringify(tareas))
        }

        // 🔹 Mostrar tareas en pantalla
        function mostrarTareas(){
            const lista = document.getElementById("lista")
            lista.innerHTML = ""

            const tareas = obtenerTareas()

            tareas.forEach(t => {
                const li = document.createElement("li")
                li.textContent = t
                lista.appendChild(li)
            })
        }

        // 🔥 FUNCIÓN PRINCIPAL
        function agregarTarea(){
            const input = document.getElementById("tareaInput")
            const nuevaTarea = input.value

            guardarEnAPI(nuevaTarea)
            .then(tarea => {
                let tareas = obtenerTareas()
                tareas.push(tarea)
                guardarTareas(tareas)

                mostrarTareas()
                input.value = ""
            })
            .catch(error => {
                alert(error)
            })
        }

        // cargar al inicio
        mostrarTareas()

    </script>

</body>
</html>
