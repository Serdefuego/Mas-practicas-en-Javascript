<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map ejemplo</title>
</head>

<body>

<script>

let frase="grande es la casa , pero la grandeza de la casa no se compara con la grandeza de su corazón"

let mapa = new Map()

function mapeando(frase){

    let recorte = frase.split(" ")

    for (let palabra of recorte){
        mapa.set(palabra, palabra.length)
    }
}

function ordenarMapa(mapa){

    let arreglo = [...mapa.entries()]

    arreglo.sort((a,b)=>a[1]-b[1])

    console.log(arreglo)

}

mapeando(frase)
ordenarMapa(mapa)

console.log(mapa)

</script>

</body>
</html>
