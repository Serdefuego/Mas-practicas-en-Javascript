<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
 <script>

//creo un constructor de objeto con nombre ,interses y un metodo mostrar
function Persona(nombre,intereses){
    this.nombre = nombre
    this.intereses = intereses

    this.mostrar = function(){
        document.write(this.nombre + " - " + this.intereses + "<br>")
    }
}
//creo un arreglo comunidad donde se alojan los objetos personas
let comunidad = []

//se crean 3 pesonas con 3 intereses que se alojan en un arreglo llamado intereses y se guardan en comunidad
for (let i=0; i<3; i++){

    let nombre = prompt("ingrese nombre")

    let intereses = []

    for (let j=0; j<3; j++){
        let interes = prompt("ingrese interes")
        intereses.push(interes)
    }

    let persona = new Persona(nombre, intereses)

    comunidad.push(persona)
}


console.log(comunidad)

//creamos un conjunto llamado grupo
let grupo = new Set()

//por cada persona extraemos los intereses y lo guardamos en el conjunto grupo, la caracteristica del grupo que no guarda duplicados
//por lo tanto obtendremos la union

comunidad.forEach(persona=>{
    for (let interes of persona.intereses){
        grupo.add(interes)
    }
})

console.log("intereses sin repetir:", [...grupo])

//ahora pasamo a buscar la diferencia y luego la intersepccion de intereses

</script>
</body>
</html>
