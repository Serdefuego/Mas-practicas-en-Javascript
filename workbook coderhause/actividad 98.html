<!-- Codificar una función con la siguiente cabecera: filtroJugadores(equipo, edad).
  En ella, se recibe un array de jugadores (objetos instanciados empleando la clase de la actividad 3),
   y una edad. La función retorna los jugadores cuya edad coincide con el segundo parámetro.
Realizar al menos cinco (5) filtros solicitando la edad al usuario, e informar sobre el resultado de los jugadores filtrados.
 -->


<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>

     <script>
       let arregloDeJugadores = [
            { nombre: "marcos", equipo: "boca", edad: 36 },
            { nombre: "juan", equipo: "river", edad: 25 },
            { nombre: "lucas", equipo: "racing", edad: 30 },
            { nombre: "mateo", equipo: "independiente", edad: 22 },
            { nombre: "santino", equipo: "san lorenzo", edad: 19 },
            { nombre: "thiago", equipo: "estudiantes", edad: 27 },
            { nombre: "enzo", equipo: "velez", edad: 24 },
            { nombre: "franco", equipo: "huracan", edad: 31 },
            { nombre: "agustin", equipo: "lanus", edad: 28 },
            { nombre: "tomas", equipo: "newells", edad: 21 }
        ]

        function filtroJugadores(equipo,edad){
            let encontrado=false
            let nombre=""
            for(personas of arregloDeJugadores){
                if(personas.equipo==equipo && personas.edad ==edad){
                    encontrado=true
                    nombre=personas.nombre
                }
            }
            if (encontrado){
                alert("se encuentra y su nombre es "+ nombre)
            }else{
                alert("no se encuentra")
            }
        }
        filtroJugadores("boca",32)
           filtroJugadores("boca",31)
              filtroJugadores("velez",24)
                 filtroJugadores("lanus",32)
                    filtroJugadores("newells",32)
     </script>
</body>
</html>
