 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>

    <input type="text" id="ingreso">
    <input type="button" value="comprobar" id="boton">
    <script>
        document.getElementById("boton").addEventListener("click",()=>{
            let ingresado=document.getElementById("ingreso").value
            comprobar(ingresado)
        })
     
        function comprobar(ingresado){
            if(ingresado.trim()!=""){
               
                alert("tiene texto")
                 return true
            }else{
               
               alert("esta vacio")
               return false
            }
        }
    </script>
 </body>
 </html>
