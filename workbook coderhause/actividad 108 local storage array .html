<!-- Si no existe un valor con la clave “comidas” en el localStorage, 
crear un array vacío y cargarlo de forma dinámica, 
solicitando al usuario nombres de comida de forma consecutiva,
hasta cinco (5) veces. Luego almacenarlo con dicha clave.
Si existe, recorrer el array, e informar por alerta el menú cargado.
Notas actividad 2
Al almacenar un array en storage con setItem, se guarda como cadena. 
Por ende, es necesario usar split(“,”) al hacer getItem, 
para obtener lo almacenado en formato  array. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>localStorage</title>
</head>
<body>

    <script>

        if(!localStorage.getItem("comidas")){

            let arreglo = []

            for(let i = 0; i < 5; i++){

                let comida = prompt("Ingrese una comida")

                arreglo.push(comida)

            }

            localStorage.setItem("comidas", arreglo)

            alert("Comidas guardadas")

        }else{

            let comidasGuardadas = localStorage.getItem("comidas").split(",")

            for(let comida of comidasGuardadas){

                alert(comida)

            }

        }

    </script>

</body>
</html>
