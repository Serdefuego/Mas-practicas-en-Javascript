<!-- Solicitar al usuario cinco (5) tareas de forma iterativa, cargandolas en un array.
 Crear una etiqueta ul, y concatenar una etiqueta li a un template de caracteres 
 por cada tarea ingresada, asignando el resultado al interior de la etiqueta ul. 
 Por último, agregar la lista al body. -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="lista">

    </ul>
    <script>
        let arreglo=[]

        for (i =0;i<5;i++){
            let actividad=prompt("ingrese actividad")
            arreglo.push(actividad)
        }

        for(actividades of arreglo){
            let li=document.createElement("li")
            li.textContent=actividades
            document.getElementById("lista").appendChild(li)


        }
    </script>   
</body>
</html>
