<!-- Declarar un array de cadenas, compuesto por  los cuatro (4) 
nombres pertenecientes a los integrantes de un equipo.
 Luego recorrer el array, e informar por alerta el nombre de cada jugador,
  así como la posición  que ocupa en la colección.

Notas actividad 1
Cuando recorremos un array, empleamos un bucle (preferentemente un for o for...of) 
para acceder a los elementos de la colección uno a uno. -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>

    let arreglo = ["Marcos", "Juan", "Pedro", "Tomas"];

    for (let i = 0; i < arreglo.length; i++) {

        alert("Posición: " + i + " - Jugador: " + arreglo[i]);

    }

</script>
</body>
</html>
