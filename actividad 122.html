<!-- Declarar una clase Cantante, instanciando al menos cinco (5) objetos con ella, 
asignándoles a un array. Luego, por cada cantante crear una etiqueta div, 
cuya estructura interna detalle la información del objeto, agregando cada contenedor al body. -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arreglo=[]
        class Cantante {
            constructor(nombre,registro) {
                this.nombre=nombre,
                this.registro=registro
            }
        }
        function crear(){
                let nombre=prompt("ingrese nombre del cantante")
                let registro=prompt("ingrese registro")
                let integrante=new Cantante(nombre,registro)
                arreglo.push(integrante)
                let div=document.createElement("div")
                let nom=document.createElement("p")
                let reg=document.createElement("p")
                nom.textContent=nombre
                reg.textContent=registro
                div.appendChild(nom,reg)
                
                document.body.appendChild(div)
        }

        for(i=0;i<3;i++){
            crear()

        }
    </script>
    
</body>
</html>
