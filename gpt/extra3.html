<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Alquiler</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 20px;
}

.departamento {
    background: #fff;
    padding: 15px;
    margin-top: 20px;
    border-radius: 8px;
    border-left: 6px solid #2196f3;
}

.cabecera {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.calendario, .mini-calendario {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 8px;
}

.dia, .mini-dia {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
    font-size: 12px;
}

.inquilino {
    border: 1px solid #aaa;
    padding: 8px;
    margin-top: 8px;
    border-radius: 4px;
}

.disponible {
    background: #e6ffe6;
    padding: 5px;
    margin-top: 5px;
    border-radius: 4px;
}

.eliminar {
    background: #e53935;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
}

input {
    margin: 3px 0;
}
</style>
</head>

<body>

<h1>Gestión de Alquiler de Departamentos</h1>
<button onclick="crearDepartamento()">➕ Agregar Departamento</button>

<div id="departamentos"></div>

<script>
let data = JSON.parse(localStorage.getItem("alquileres")) || [];

function guardar() {
    localStorage.setItem("alquileres", JSON.stringify(data));
}

/* ================= DEPARTAMENTOS ================= */

function crearDepartamento() {
    data.push({
        id: Date.now(),
        nombre: "Nuevo Departamento",
        inquilinos: []
    });
    guardar();
    render();
}

function eliminarDepartamento(id) {
    if (!confirm("¿Eliminar este departamento y todos sus datos?")) return;
    data = data.filter(d => d.id !== id);
    guardar();
    render();
}

function editarNombreDepto(id, nombre) {
    data.find(d => d.id === id).nombre = nombre;
    guardar();
}

/* ================= RENDER ================= */

function render() {
    const cont = document.getElementById("departamentos");
    cont.innerHTML = "";

    data.forEach(depto => {
        const div = document.createElement("div");
        div.className = "departamento";

        div.innerHTML = `
            <div class="cabecera">
                <input value="${depto.nombre}"
                       onchange="editarNombreDepto(${depto.id}, this.value)">
                <button class="eliminar"
                        onclick="eliminarDepartamento(${depto.id})">
                    Eliminar
                </button>
            </div>

            <div>
                <input placeholder="Nombre inquilino" class="nombre">
                <input type="color" class="color">
                <input type="date" class="inicio">
                <input type="date" class="fin">
                <input type="number" placeholder="Precio día" class="precio">
                <input type="number" placeholder="Seña" class="sena">
                <button onclick="agregarInquilino(${depto.id}, this)">
                    Agregar Inquilino
                </button>
            </div>

            <div class="inquilinos"></div>
            <div class="disponibilidades"></div>
            <div class="calendario"></div>
        `;

        cont.appendChild(div);
        crearCalendario(div.querySelector(".calendario"), depto.inquilinos);
        renderInquilinos(div, depto);
        renderDisponibilidad(div.querySelector(".disponibilidades"), depto);
    });
}

/* ================= CALENDARIO PRINCIPAL ================= */

function crearCalendario(cal, inquilinos) {
    cal.innerHTML = "";
    const hoy = new Date();
    const año = hoy.getFullYear();
    const mes = hoy.getMonth();
    const diasMes = new Date(año, mes + 1, 0).getDate();

    for (let d = 1; d <= diasMes; d++) {
        const fecha = `${año}-${String(mes + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const div = document.createElement("div");
        div.className = "dia";
        div.textContent = d;

        inquilinos.forEach(i => {
            if (fecha >= i.inicio && fecha < i.fin) {
                div.style.background = i.color;
                div.style.color = "#fff";
            }
        });

        cal.appendChild(div);
    }
}

/* ================= INQUILINOS ================= */

function agregarInquilino(id, btn) {
    const depto = data.find(d => d.id === id);
    const c = btn.parentElement;

    const inicio = c.querySelector(".inicio").value;
    const fin = c.querySelector(".fin").value;

    if (!inicio || !fin || inicio >= fin) {
        alert("Fechas inválidas");
        return;
    }

    if (depto.inquilinos.some(i => inicio < i.fin && fin > i.inicio)) {
        alert("❌ Fechas superpuestas");
        return;
    }

    const precio = Number(c.querySelector(".precio").value);
    const sena = Number(c.querySelector(".sena").value);
    const dias = (new Date(fin) - new Date(inicio)) / 86400000;
    const total = dias * precio;

    depto.inquilinos.push({
        nombre: c.querySelector(".nombre").value,
        color: c.querySelector(".color").value,
        inicio,
        fin,
        precio,
        sena,
        total,
        resto: total - sena
    });

    guardar();
    render();
}

function renderInquilinos(div, depto) {
    const cont = div.querySelector(".inquilinos");
    cont.innerHTML = "<h4>Inquilinos</h4>";

    depto.inquilinos.forEach((i, index) => {
        const box = document.createElement("div");
        box.className = "inquilino";

        box.innerHTML = `
            <b>${i.nombre}</b><br>
            ${i.inicio} → ${i.fin}<br>
            Total: $${i.total} | Seña: $${i.sena}<br>
            <b>Resto: $${i.resto}</b><br>
            <button onclick="eliminarInquilino(${depto.id}, ${index})">
                Eliminar
            </button>
            <div class="mini-calendario"></div>
        `;

        cont.appendChild(box);
        crearMiniCalendario(
            box.querySelector(".mini-calendario"),
            i
        );
    });
}

function eliminarInquilino(id, index) {
    data.find(d => d.id === id).inquilinos.splice(index, 1);
    guardar();
    render();
}

/* ================= MINI CALENDARIO POR INQUILINO ================= */

function crearMiniCalendario(cal, inq) {
    cal.innerHTML = "";
    const hoy = new Date();
    const año = hoy.getFullYear();
    const mes = hoy.getMonth();
    const diasMes = new Date(año, mes + 1, 0).getDate();

    for (let d = 1; d <= diasMes; d++) {
        const fecha = `${año}-${String(mes + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const div = document.createElement("div");
        div.className = "mini-dia";
        div.textContent = d;

        if (fecha >= inq.inicio && fecha < inq.fin) {
            div.style.background = inq.color;
            div.style.color = "#fff";
        }

        cal.appendChild(div);
    }
}

/* ================= DISPONIBILIDAD ================= */

function renderDisponibilidad(cont, depto) {
    cont.innerHTML = "<h4>Disponibilidad</h4>";

    const hoy = new Date();
    const año = hoy.getFullYear();
    const mes = hoy.getMonth();

    const inicioMes = new Date(año, mes, 1).toISOString().slice(0,10);
    const finMes = new Date(año, mes + 1, 0).toISOString().slice(0,10);

    const alquileres = [...depto.inquilinos].sort((a,b) =>
        a.inicio.localeCompare(b.inicio)
    );

    let cursor = inicioMes;

    if (alquileres.length === 0) {
        cont.innerHTML += `<div class="disponible">${inicioMes} → ${finMes}</div>`;
        return;
    }

    alquileres.forEach(a => {
        if (cursor < a.inicio) {
            cont.innerHTML += `<div class="disponible">${cursor} → ${a.inicio}</div>`;
        }
        cursor = a.fin;
    });

    if (cursor < finMes) {
        cont.innerHTML += `<div class="disponible">${cursor} → ${finMes}</div>`;
    }
}

/* ================= INIT ================= */

render();
</script>

</body>
</html>
